<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reports — RemoteLab</title>
<style nonce="{{NONCE}}">
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  background: #ffffff;
  color: #2d3436;
  min-height: 100dvh;
}
.nav {
  position: sticky; top: 0; z-index: 100;
  background: #ffffff;
  border-bottom: 1px solid #dfe6e9;
  padding: 12px 20px;
  display: flex; align-items: center; gap: 16px;
  font-size: 14px;
}
.nav a { color: #002fa7; text-decoration: none; font-weight: 500; }
.nav a:hover { text-decoration: underline; }
.nav h1 { font-size: 18px; font-weight: 700; color: #2d3436; letter-spacing: 0.5px; }
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.empty {
  text-align: center;
  padding: 80px 20px;
  color: #636e72;
  font-size: 15px;
}
.card {
  display: block;
  text-decoration: none;
  color: inherit;
  border: 1px solid #dfe6e9;
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 12px;
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: pointer;
}
.card:hover {
  border-color: #002fa7;
  box-shadow: 0 2px 8px rgba(0, 47, 167, 0.08);
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: #2d3436;
  margin-bottom: 6px;
}
.card-meta {
  font-size: 13px;
  color: #636e72;
  display: flex; gap: 16px; flex-wrap: wrap;
}
.card-meta span { display: inline-flex; align-items: center; gap: 4px; }
.card.unread { border-left: 3px solid #002fa7; }
.card.unread .card-title { color: #002fa7; }
.loading {
  text-align: center;
  padding: 60px 20px;
  color: #b2bec3;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="nav">
  <a href="/">← 返回</a>
  <span style="color: #b2bec3;">|</span>
  <h1>Reports</h1>
</div>
<div class="container">
  <div class="loading" id="loading">Loading...</div>
  <div id="list"></div>
</div>
<script nonce="{{NONCE}}">
(async function() {
  const listEl = document.getElementById('list');
  const loadingEl = document.getElementById('loading');
  try {
    const res = await fetch('/api/reports');
    if (!res.ok) throw new Error('Failed to fetch');
    const reports = await res.json();
    loadingEl.style.display = 'none';
    if (!reports.length) {
      listEl.innerHTML = '<div class="empty">暂无报告</div>';
      return;
    }
    listEl.innerHTML = reports.map(r => {
      const date = new Date(r.createdAt).toLocaleString('zh-CN', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      const unread = r.read ? '' : ' unread';
      return `<a class="card${unread}" href="/reports/${r.id}">
        <div class="card-title">${esc(r.title)}</div>
        <div class="card-meta">
          <span>${date}</span>
          ${r.source ? `<span>${esc(r.source)}</span>` : ''}
        </div>
      </a>`;
    }).join('');
  } catch(e) {
    loadingEl.textContent = '加载失败';
  }
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
